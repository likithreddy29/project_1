name: "Terraform Infrastructure Deployment"

on:
  push:
    branches:
      - main
    paths:
      - 'main.tf'
      - 'variables.tf'
      - 'outputs.tf'
      - 'terraform.tfvars'
      - '.github/workflows/deploy.yml' # Keep this so pipeline changes trigger it
  workflow_dispatch: # <-- This enables the manual execution button
permissions:
  id-token: write
  contents: read

jobs:
  # JOB 1: Run the Plan automatically
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

  # JOB 2: Wait for manual approval before applying
  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-plan # Ensures the plan job finishes first
    runs-on: ubuntu-latest
    environment: production # Activates the manual approval gate in GitHub Settings

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
